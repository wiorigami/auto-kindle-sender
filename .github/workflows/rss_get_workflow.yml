name: RSS to EPUB Archive

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml feedparser requests ebooklib pillow beautifulsoup4 readability-lxml lxml

    - name: Run RSS generator
      env:
        CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
      run: |
        python main.py

    - name: Debug output (important)
      run: |
        echo "===== repo status ====="
        git status

        echo "===== articles tree ====="
        ls -R articles || true

        echo "===== file sizes ====="
        ls -lh articles || true

    - name: Commit EPUB files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # 强制加入所有变化（避免漏文件/编码问题）
        git add -A

        echo "===== staged files ====="
        git diff --cached --name-only

        # 如果没有变化就退出
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "update rss epubs"
        git push
