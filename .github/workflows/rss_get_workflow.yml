name: RSS Collector to EPUB

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install feedparser pyyaml ebooklib lxml beautifulsoup4 readability-lxml

    - name: Run generator
      run: |
        python main.py

    - name: Commit EPUB files
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add articles/*.epub || true
        git commit -m "update rss epubs" || echo "no changes"
        git push
